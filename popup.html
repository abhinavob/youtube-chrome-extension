<link rel="stylesheet" href="popup.css">

<div class="popup-root">
    <h2>Ad Settings</h2>
    <label><input type="radio" name="adMode" value="off"> Off</label>
    <label><input type="radio" name="adMode" value="autoSkip"> Auto skip</label>
    <label><input type="radio" name="adMode" value="autoSpeed"> Auto speed</label>
    <label class="speed-row">Speed: <input type="number" id="adSpeed" min="1" max="16" step="1" value="2">x</label>
    <label><input type="radio" name="adMode" value="manualSkip"> Manual skip</label>
</div>

<script src="popup.js"></script>
